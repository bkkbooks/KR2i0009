body:
  text: 江南野史卷七宋龍衮撰陳省躬周彬孫魴鄧洵美李家明潁川陳省躬者南昌人或作南安少負詞學與徐鉉兄弟友善先主輔政射策入仕纍官至廬陵永新令在任明察治理吏不敢欺敏於判剖部民交訟不下吏議面訊其由窮省情愫立分當否不勞案驗兩造甘愜其訟自弭復恃其才幹往往判還郡符時郴衡之盜入境暴掠民有防戍健卒扞禦者多為其所殺省躬遂給府緡市棺殯葬郡守下符讓其專輒令認其愆尤省躬怒遂判符後云開官庫使官緡買棺木葬官軍何過之有緘而遣之郡守覽而不能屈部有教人者引及知見郡吏贄符命之其人竄逐遂恐迫其婦婦懼乃自縊省躬械繫郡吏仍致辭於上曰一夫抱恨六月降霜一婦深寃三年大旱本為教人却致殺人請加明罰由是抵罪然有過誤陷於刑者理之可憫嘗哀而出之其佐有蕭某者執法不回捐牒不署蹈禮不逮而與令爭令欲毆之大罵曰臭下輩簿對曰啞義手者即是下輩行拳却是上輩令慚謝時太守武士也聞之怒其佻慢乃使召之既至下吏按驗省躬乃寫籀文答之吏稱不辨省躬背曰何不使倅拭瞎讀之吏示倅亦不辨於是遣還省躬謂人曰今朝廷識字者惟僕與徐家兄弟耳餘奚足算哉初南越王劉隱之子跨據交廣絶朝貢之禮李太保使諷後主俾以檄書諭以禍福朝議以省躬才辨遂任為價既逾嶺至韶廣後主使水道而進既登舟遂以重幕羃之舟中之人略可相視逾數日又重幕圍之使登岸屣步才十許里至館中供帳頗異常物其主使勞慰燕飲纍日忽舁饋贐之物并報函復圍而遣之至水濱登前所幕舟日夕惟聞牽駕之聲然不知其㳂泝七八日復至韶而還死於舟中者幾數人省躬在治産一子逾月將名之問㕔吏蕭德之曰汝育幾子對曰有男五人省躬遂命子小名為蕭六省躬為人雖醜忌疾邪惡然利於貨賂邑豪龍氏誘殺郴衡歸明人户逮百口取其貨并婦女事露後主遣尚書郎張佖就案之私使詢於省躬驗其謬實龍氏竊知之饋白金殆百千省躬受而僞諾之乃報佖曰彼固殺之矣故時以是不多其為人入中朝而位終不顯逹者良由此類也故參政彭年者乃其子蕭六也彭年於大中祥符初與內翰朝公今相王君四人同知貢舉省榜將出入奏試卷天下舉人壅衢而觀其出省諸公皆蹙額其容獨彭年揚鞭肆目有驕矜賈衒之色及榜出其甥不在選中遂怒入其第㑹彭年未來於几上得黃敕乃題其背云彭年頭腦太冬烘眼似朱砂鬢似蓬紕謬幸叨三字內荒唐仍預四人中放他權勢欺明主落却親情賣至公千百孤寒齊灑淚斯言無路入堯聰彭年一見怒不獲已遂抱敕入奏真宗見而悅之因釋其罪彭年好勢附寵嘗與丁相樹黨不顧已因人釋褐復更例場體式妄立法制考覆程試結怨士人後雖數月而卒時人謂之耕田手而非鼎鼐之器也周彬世為廬陵禾川人少不治産業服膺儒學刻苦進修俾晝作夜其婦嘗讓之曰汝徒自如是卒有益乎汝家兄弟皆能力稼穡營作豐益囊箱汝之不調而無思悔畢向如何答曰卿嘗與吾市油數金是亦力稼營已而已但嵗晚必得力後聞先主鎮金陵乃囊文而往未幾㑹禪代歸姓制度草創無取士之科將有事於圜丘募四方英秀各為祝史之文彬之所著特加選用遂署諸衛巡官嗣主與太弟景逹貽書交辟置之門下賜賚頗厚得遷省拜以所賜繒帛金幣陳列於庭謂婦曰吾昔與卿同營已者今一旦成矣比諸伯叔何者為勝耶尚能讓於吾乎妻答曰斯男子之事非婦人女子所能知時邑人有侮慢之言彬數歎曰昔魯人俚孔子謂之東家丘者果然入金陵待選授大理司考滿以母憂歸葬謁本郡令直造其㕔署令詰之曰公雖朝省直寮其如桑梓之禮何彬怒因誓之曰吾不歸令於此有如白日及復建康數月如前官歸宰本邑令慙謝而去鄉里相慶榮其晝錦然為政廉平恩仇不録將解任邑中耆艾緇黃輩數百人詣郡上疏乞留遂連任七考有相訟者以理和解之而無適莫既而復選嗣主錫以銀章茜綬以本官居職持法平直不阿權要朝廷憚之纍遷尚書郎出授武昌節度掌書記守江夏令未幾而卒孫魴世為南昌人家貧好學及長㑹唐末喪亂都官郎鄭谷亦避亂歸宜春魴往師之頗得其誘掖後有能詩之名向與沈彬及桑門齊已虛中之徒為唱和儔侣屬吳王行密據有江淮遂歸射策授州郡從事與沈彬嘗遊於李建勳為詩社彬為人口辨每好較人詩句時魴有夜坐句美於時輩建勳因試之先匿魴於齊中候彬至乃問魴之為詩何如彬答曰人言魴非有國風雅頌之體實得田舍翁火爐頭之作何足稱哉魴聞之大怒突然而出乃讓彬曰君何誹謗之甚而比之田舍翁言無乃太過乎彬答曰子夜坐句云劃多灰漸冷坐久席成痕此非田舍翁爐上作而何闔座大笑善彬能近取譬也及題金山寺詩云萬古波心寺金山名目新天多剩得月地少不生塵過櫓妨僧定驚濤浴佛身誰言張處士題後更無人有集僅百篇皆此類先主受禪纍遷正郎後卒鄧洵美世為湖郴郡人少有敏才長而工詩長於賦頌天祐中與連人孟賓于共為亷使李侍郎所薦入洛陽與故李司昉同年擢進士第以天下喪亂諸道割據遂還鄉里為潭州節度使馬氏所辟署職郡縣心常怏怏不愜僅十年間昉奉使湖南求訪洵美既見情好歡洽不替曩昔且惜其才富位卑滯於侯國昉既行因請齎致京師馬氏餞之為鴆而卒洵美晚娶無子有三女貧瘁流落風塵澧陵人盧氏聞洵美名憐而購之歸以其女妻於儒家先是太常寺丞陳度有薛孤延鬭雷賦頗為時彥所推尚而洵美集中亦有此作前後語句皆同惟首末小異未識誰氏之述也李家明世為廬州西昌人嗣主時為樂部頭有學解滑稽善諷諫為時所推從嗣主遊後苑登於臺觀盛望鍾山雨曰其勢即至矣家明對曰雨雖來必不敢入城嗣主怪而問之家明曰懼陛下重稅嗣主曰不因卿言朕幾不之知遂令𣙜務降半而征之及見牛晚卧樹隂嗣主曰牛且熱矣家明曰臣不調敢上絶句曰曾遭寧戚鞭敲角又被田單火燎身閒背夕陽嚼枯草近來問喘更無人時左右宰臣皆慚免冠謝宋齊丘晚得一子輒死齊丘哭之慟逾月自親王宰寮勉之不止家明謂主曰臣能止之矣大王當復厚賜主許諾家明遂作一大紙鳶上書云欲興唐祚革强吳盡是先生設計謨一個孩兒拚不得讓皇百口合如何乘風鼓之至齊丘之第遂絶其縷使之墜下齊丘見之慚感而止家明大獲所賞緡帛後嗣主於苑中命百寮臨池而釣諸臣皆屢引其鱗惟嗣主無所獲家明見其猶豫乃曰臣昧死敢上芻蕘曰玉甃金鈎興正濃碧池春暖水溶溶凡鱗不敢吞香餌知道君王合釣龍嗣主嘉之喜極歡燕而散及嗣主加王弟景逹等官而恩未即加於臣下因賜燕享家明乃入末作二翁婦而出列坐令其新婦每進一飲一食皆輒拜獻而禮頗煩劇翁婦怒而責之曰新婦自家官自家何用煩拜耶嗣主聞之曰孤為一方之主而恩不覃於外孤之過也家明之言不亦宜乎因厚賜之而加百官焉先是建州王延政與閩州兄延羲有隙遂各稱帝嗣主遣將平之俘延政及百官入建康尋封王遂命王公宰寮之屬燕其第時遣家明率樂部往延政嗇於賄賂家明怒其寡而譏之曰賤工無伎大王優賜不敢奉命然告大王敢乞一物延政曰吾家所有惟汝所命家明曰大王平天冠今且無用家明敢取之延政默然慚恨而罷自是怏怏發疾而卒時家明母死欲歸葬會嗣主聽政之暇坐於便殿秉筆於琬琰上閒書草字家明因詐曰臣每竊學人署字與之不疑嗣主曰卿能學孤為乎家明曰臣雖愚魯願效神蹤嗣主乃於麻紙上大押字命試學焉家明得之輒於草字上書云宣州上供庫支錢二百緡付家明安厝母親嗣主見之大笑因而賜焉從嗣主幸南都時既已劃江舟楫多從南岸至趙屯因輟樂停歌北望皖公山謂家明曰好青山數峯不知何名耶家明應聲對曰龍舟輕颭錦帆風正值宸遊望逺空回首皖公山色翠影斜不到夀杯中嗣主因慙俯首而過及後主嗣位家明老而無寵焉江南野史卷七
