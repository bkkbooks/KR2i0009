body:
  text: 江南野史卷三宋龍衮撰後主宜春王後主后周氏後主名煜字重光本名從嘉及嗣立改焉嗣主第六子太子冀同母弟初封安定郡公周師入淮甸遷神武都虞候沿淮巡撫使因獵於野時周世宗怒不割淮南地師衆將渡江征建康見白氣貫空使覘之乃後主與衆獵焉嘆曰彼有人焉未可圖也遂止嗣主聞之因立為後吳王參政嗣主南遷洪州遂立為太子監國嗣主殂遂即位尊母鍾氏為太后立妃周氏為皇后封諸弟為王百官皆加職罷諸郡屯田歸州縣委所屬宰簿與常賦俱徴隨所租入十分錫一謂之率分以為祿廩諸朱膠牙稅亦然由是公無遺利而屯田佃民絶公吏之撓刻獲安業焉乾德二年始用鐵錢以十當銅之一初嗣主即位征伐頻起先主德昌泉布既竭遂議鑄唐國錢其眉曰唐國通寶約一千重三斤十二兩至數年而弊作百姓盜鑄幾至一斤餘以一文置之水上浮而不沉雖嚴禁不止至是有鐵錢之議既行至數年物價漸增諸郡之民復盜鑄者頗多而輕小環外芒刺不及官場圓淨國家雖以法繩之犯者配逺郡民罹之者益衆而不止又先主世不槩括定民産自正斛上别輸三斗於官廩受鹽二斤謂之鹽米百姓便之及世宗克淮南鹽貨遂艱官無可支至今輸之猶為定制以林仁肇為南都留守守南昌尹冬建州節度使陳誨卒時後主不恤政務清曉於禁中卧內聽道場童行撞鐘有節數喜而召之與剃度為僧而童子奸猾對曰不敢獨受恩澤願陛下如佛慈悲廣覃諸郡於是普度焉十月二日後主納國開寶三年冬後主因校獵於青龍山還大理寺親録囚繫多獲原宥給事中蕭儼中書侍郎韓熙載等彈奏獄訟必申有司囹圄之中非車駕所宜至請省司罰內帑錢三十萬充軍資庫用三年夏太白日見至秋方沒又兩日相觸時人以規見之是年韓熙載卒天王使至諷後主入朝煜不應詔初流言共謂北使竊同後主出餞至船必載之北渡自是後主懼不復登使者舟秋撫州齊王景達卒遣弟宜春王從謙入朝京師冬有商人上密事請竊往江陵焚燒北朝所造樓船戰艦數千艘乞割符驗後主懼事泄不敢聽於是商人遁去下令貶損制度下書稱教改中書省為左右內史府尚書為會府御史臺為司憲府翰林為𢎞文館樞密院為光政院降諸王為郡公初臺閣殿各有螭吻自乾德後天王使至則去之使還復用至是遂除四年冬南都留守南昌尹林仁肇卒遇鴆也誅內史舍人潘佑户部侍郎李平以侍衛親軍都虞候申屠令堅為吉州刺史六年遣次弟鄧王從益朝京師尋遣回諭令後主入朝六年冬王師濟江克池州以天德軍都虞候杜真率師禦之敗績於當塗遂戒嚴城守下令去開寶之號公私牒籍稱甲戌嵗募民獻納緡粟以禆國用而署之以爵秩時獻者頗多袁州萍鄉制置使劉茂忠破潭師於境內八年春有彗星孛於東方初亘中天其末曲向北時謂之帚星逮曉幾亭午短如帚焉城將陷越人攻丹徒命同德軍都虞候盧絳督舟師出援之是嵗閲民為司徒初先主之世既為量民田以奠科賦自二緡而上家出一卒謂之義師中有别籍分居亦出一卒謂之新生擬軍至民間有新置物産者亦出一卒謂之新擬軍又於客户內有三丁者抽一卒謂之團軍後改為拔山軍使物力户為之將校董之又嗣主之世許諸郡民划競渡船每至端午官給綵帛俾兩兩較其殿最勝者加以銀碗謂之打標皆籍其名至是盡搜為卒謂之凌波軍民間傭奴贅壻謂之義勇軍又募豪民皆自備緡帛車服兵器招集無賴亡命輩謂之自在軍民應之者益多矣王師圍急乃竊降蠟書招百姓自老弱外能披執者謂之排門軍凡十三等名遣赴邊境及登城守把建康城陷方罷歸農其將校起發入京師數年放還鄉里夏誅神衛統軍都虞候皇甫繼勳秋洪州節度使朱令贇自潯陽湖口率水陸諸軍將校援建康進次虎蹲州與王師合戰衆皆潰令贇死之初後主以天兵圍近厯年百姓疫死士卒乏食俾陳喬作降欵與太子出降使行人與約詰旦至午未決尋城陷都招討使曹彬既入後主出拜於宫門彬曰何故負約後主無辭唯言人心不一故也遂令左右奉璽綬上彬彬復令後主作書委諭諸郡令以城歸順唯江州不從其禆將胡則殺刺史監軍使遂據城叛先鋒曹翰率衆攻之師老而疲至明年冬食盡方陷遂屠其城王師既入建康惟後主宫門不入時升元寺閣數層髙可十餘丈梁時為瓦官閣豪民富商之家避難於上逮千餘人為越人所焚一炬而燼彬乃使監守後主與二弟太子而下登舟赴闕百司官屬僅千艘將發號泣之聲滿於水陸既行後主於舟中時泣數行下因命筆自賦詩云江南江北舊家鄉三十年來夢一場吳苑宫閨今冷落廣陵臺閣已荒涼雲籠逺岫愁千片雨打孤舟淚萬行兄弟四人三百口不堪閒坐細思量既至汴口欲登禮普光寺左右猶諫止後主怒而大罵曰吾自少被汝輩禁制都不自由今日家國俱亡尚如此耶遂登禮拳拳嘆息久之散施衣物緡帛至京師乃面縛銜璧羣臣輿櫬以見太祖太祖以後主拒命勞師怒之然念稱藩入貢二十餘年乃赦之後主與臣僚素服徒步太祖御乾元樓乃告曰汝為江南國主已乎煜見左右班列儀衛嚴肅股栗久之不能對尋命赦罪賜冠帶遣就館封違命侯授左千牛衛上將軍太宗登極改封隴西公太平興國三年秋後主因疾作上宣翰林醫視服藥遣中使慰諭者數四翼日而殂在江南臨蒞十五年年四十二贈太師追封吳王給賜含禭彌厚遣中使護喪事初後主既違朝㫖拒命不行嘗謂人曰他日王師見討孤當躬擐戎服親督士卒背城一戰以存社稷如其不獲乃聚室自焚終不作他國之鬼太祖聞之謂左右曰此措大兒語耳徒有其口必無其志渠能如是孫皓叔寶不為降虜矣至是果然後主自少俊邁喜肄儒學工詩能屬文曉悟音律姿儀風雅舉止行措宛若士人酷信浮圖之法垂死不悟常於禁中聚僧尼署寺宇于中所聚逮數百人朝退與后頂僧伽帽衣袈裟専誦佛書手不暫釋拜跪頓顙至為疣贅親為桑門削作厠簡子試之腮頰有少澀滯者再為治之其手常抄乃學佛握印而行百官士庶則而效之由是建康城中寺院僧徒逮至萬餘親給廩米帑藏緡帛以供之常召募有道士為僧者與之二釡往往有貪茍而為之者僧犯姦有司具牘還俗後主不聼曰僧人姦淫本圖還俗今若從之是縱其欲勒令禮佛三百拜免其刑北朝聞之隂選少年有經業口辨者往化之後主崇奉謂之一佛出世號為小長老朝夕與論六根四諦天堂地獄循環果報又勸說令廣施剎梵營造塔像身被紅羅銷金三事後主讓其太奢乃曰陛下不讀華嚴經爭知佛富貴自是襟懷敞恍兵機守禦之謀茫然而弛囷廩漸虛財用益竭又使寺僧於牛頭山大起蘭若僅千間聚徒千衆旦暮設糜食無非異方珍饌一日食之不盡明旦再具謂之折倒時議謂折倒為煜自䜟及天兵至獲為營署北朝又俾僧於采石磯下草庵自云少而草衣木食後主使為獻供佯為不受乃隂鑿穴及壘石為塔濶數圍髙逮數丈而夜量水面及王師尅池州而浮梁遂至繫於塔穴且度南北不差毫釐師徒合圍有小長老議其拒守對曰臣僧當遙退之於是登城大呼而周麾兵乃小却後主喜令僧俗兵民念誦救苦觀音菩薩滿城沸湧未幾四面矢石雨下士民傷死者衆後主復使言之託疾不起及誅皇甫繼勳之後方疑無驗乃鴆而殺之時城中有僧數千表乞披堅執鋭出城鬭戰後主不從曰不可毁他教法宰相湯說吏部尚書徐鉉之徒但順非文過尸祿希㫖曾不一言諫諍坐待王師隂伺敗亡隨作繫虜韓熙載諛佞茍容嘗上疏云諸佛慈悲尚容悔過言多此類釀成禍胎見危是幸逮盧絳出水戰生獲禆校及甲士百人其校身狀容貌魁岸甚武將見後主或告之曰若對官家善為詞說必免其禍校乃抗聲彼則一國主何官家之有既見喏而不拜後主喜而且懼因問北師中似汝輩者幾何對曰國主若悟誠宜趣降為一城生民延命茍不如是旦夕之中適為魚肉如吾輩者幾萬何足問之後主默然無斷久之令出為閽人所刺乃大呼曰我恨死不得其地矣餘甲士皆重傷後主哀之給飲食藥餌治之逮愈引見各紿曰官家如佛慈悲好生惡殺臣等無以為報答願踰城竊斬北師以謝生成乃夜縱之逮旦皆割馘而至後主喜之賞賜有加於是再遣之而不復至矣後主不知賊刵城外百姓耳獻焉故城中虛實之狀皆被測之諸郡有斷死獄者當先奏牘既詳覆無疑乃於佛前炷香爇燈以達旦為驗若火滅則從之如燃則貸死富商大賈有犯法者乃賂左右竊續之而致獲宥者多矣其為人茫昧如此不亡何俟初北朝兵將興吉州子城上有神現頭如車輪額上有珠光爍于月軍民皆見數日而沒今俗呼為天王樓又建康城外沿江排大樓航皆有將軍之封忽一艘且吼如人聲聞於十數里後主乃降杖決之又見鳬鴈自北而飛逮千羣至城側呌嘯悲鳴遺糞於城屋及女牆上皆白而臭月餘乃止城中士庶衣碧服染時須經宿露則愈鮮妍時謂之天水碧廬陵曾氏將娶婦忽化為女後嫁之生子焉又有海鰌形如大堤長數十丈至於潯陽值冬水涸不能轉掉每每噞喁水自腦而出或云海神取其珠矣逮死人食其肉者至多或以脅骨為橋脊骨為臼鰌者鯉之類也既死則國亡其怪䜟之多若是煜之君若臣皆顓䝉不悟其妖宜春王從謙嗣主第九子後主之同母弟幼而聰悟好學有文辭年未弱冠有能詩之名嗣主嘗於苑中與宰相奕而從謙侍側嗣主命之賦觀碁詩乃援筆立賦曰竹林二君子盡日意沉吟相對終無語爭先各有心恃强終有失守分固無侵若算機謀處滄溟猶未深嗣主覽之驚嘆令頒示百寮以為規誡士流爭寫紙價湧於建康及後主嗣立封為王開寶中天王詔後主入朝煜未行乃遣從謙奉朝貢既至敷奏無失禮節太祖優恩封之為兖王賜第宅錫賚頗厚恩極藩戚未幾侍上上從容謂之曰卿可貽書與國主令入朝奉朕當大駕抵宋亳而迎封之以大府所謂彼此遭逢自無失時對曰臣兄以庸菲之才嗣守宗廟陛下垂覆載之恩許之入朝實千載之遇必須奉詔太祖因賜酒食緡帛而罷及從謙為書使至建康喻以上意而後主為陳喬等所制乃不從及平建康後主繫闕太祖詰以不從從謙之㫖拒命勞師後主懼乃僞對以不聞其命太祖怒遂降從謙於南班既以家國喪亡爵秩貶損妃御不存默默不自安遂臥疾不數日而卒初從謙奉使入闕質而不返其妃每哭詣後主無以為計每聞使至必避之而已兵未起以思慕不已而成疾卒後主后周氏司徒宗之少女前后之妹少以姻戚往來宫中後主見其美姿容乃納之前后疾將亟忽見后入乃問妹妹幾時至宫來后時年幼不知嫌疑即以實對曰既數日矣后怒遂面壁而臥至死不顧后既殂嘗入禁中至納為后乃成禮而已將納采後主令交鵝被以繒綵使銜書極於侈靡及親迎民庶觀者或登於屋有墜瓦而死者其夕燕羣臣韓熙載降階為詩以諷焉而後主不之譴自是士庶婚姻寖成風俗及後主封違命侯后封妃太平興國三年後主殂未幾后亦卒江南野史卷三
