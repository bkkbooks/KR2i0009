body:
  text: 江南野史卷十宋龍衮撰盧絳朱令贇申屠令堅劉茂忠盧絳字晉卿世為南昌人其父唐末仕南平王鍾傳署舘驛廵官有子七人絳乃其仲子也少好學書理無不研精頗通大義不治産業每縱俠與博徒游初西京作坊副使尹承諤少於後主世獻利便歸吉州興軍廻務以資國用路過南昌絳能書計辟為本務吏暇則從博徒奕角觝輩飲食無何貧困乃欺竊官緡罪當棄市承諤且發絳懼易儒服逃於淦陽土豪陳氏家尋會赦獲免旦夕與陳氏諸子乃雜録六韜之屬陳知其識度狀貎非儒家者流乃謂絳曰吾竊知子頗有謀畧今國家方急賢豪非子窮委之時也遂厚資贐以遣之絳不獲已而行至豐城為曩昔交遊無賴相率飲博數日之間囊裹皆罄遂無聊入南昌兄及母弟皆􅅓鄙不録因自慙憤聞盧山有白鹿洞書院遂詣國學與諸葛濤蒯鼇等善不聽講讀惟以屠沽販鬻為事同舎諸生中有篋笥少豐而吝者則强取之弱者侮之及下山尋師有嗇於賔道者乃隂持禁物誣之俾出緡帛洞中流輩號為三害及朱弼新除國子助教欲疏理其罪絳遂亡入金陵既至塊然旅邸素無知舊裂裳既匱遂薄遊京口徃來壁澗寒雪薪炭若桂少有膂力乃踊折簷桷而燒時有守囷吏見而壯之延歸既乆遭嵗饑吏無以給因俾絳夜躍囷簷自氣樓間入竊官粟數十又一夕徃入見長人先立囷中絳於是奮摶而束之乃為一柱冷若氷鐵頃之失所據乃懼而出遂中痁疾逾月既乏資給疲瘵且極忽夢一白衣婦人頗姿態謂之曰子之疾當食蔗即愈詰朝見鬻蔗者絳揣囊中半晌乏一鏹惟有唐韻一册遂指易之其人曰吾輩乃小販鬻將出安用哀君欲之志切遂貽數挺絳喜而食之至旦疾捐但資用窘廹嘗黙黙不自持迨數夕又夢前白衣婦人謂絳曰妾乃玉眞也太尉富貴時可徃詣都城妾有一詩一緡以助行旅十年之後於孟家陂上自當會見言畢乃歌其詩曰清風良月夜深時箕帚盧郎恨尚遲他日孟家陂上約再來相見是佳期言訖而去絳驚覺因思其語呼已為太尉乃惘然又不測孟家陂在何所展轉反側忽於卧旁果獲其緡由是自負襟懐豁然入金陵畫策詣後主上疏陳京口至壁澗數處要衝之地宜立栅屯戍廣設備禦并條利害數十事絳素有口辨敏㨗候數日不報復為書詣光政陳喬見之與語數日遂大竒之因表署為本院承㫖使督百卒於任所陳利便經營制度頗見幹績尋就轉㳂江諸屯兵馬監押兼廵檢於是召募亡頼少年便於舟檝狎習水道者得馬雄王川軍張三十四等數十人立為偏禆將校俾督卒伍號令日嚴操練水戰金鼓使知前却示以旌旗指麾行列部分次序進退遅速有法轉運如飛時有一艘應命稍稽遂斬其長復試之可使蹈巨浪累於海門遮獲越人船舫百餘艘鹽數萬石獻之後主賞其功遂封爵柱國及王師渡江尅池州急召還授凌波軍都虞候城外沿江都部署王師累攻秦淮口水栅絳率舟師徃援之前後興都統軍皇甫繼勲與鄭彦華忌絳功出已上説後主遣之出援丹陽絳因率大部舟百艘列之為八字陣而行曹彬等識所部開圍出之既至京口舎舟登岸與之三戰越人三北其圍乃解乃以為潤州節度使守大部自絳出建康水陸之攻愈急後主數詔遣還為左右所沮未幾宣州叛乃授絳節度使討之遂平其城金陵䧟諸城皆下惟絳等不順謀割據嶺表使建州刺史陳徳誠等徃諭之過歙州龔慎儀閉門不納絳怒曰慎儀乃吾故人何故見拒使馬雄攻之城䧟慎儀朝服而出為雄所殺既而絳弟奔宋太宗詔㫖委諭罷兵入朝絳遂聚將校議之王川軍之徒皆厲聲拒命不從絳欲殺弟而行弟乃私謂之曰兄今不順詔命乃獨善一身其如老母并一族三百口何絳猶豫會先鋒曹翰使賫鐵劵至絳乃與馬雄張三十四等數十人脱身夜亡餘衆亦潰曹翰使衛送京師既見上問絳曰卿何不早歸朝廷勞朕詔命對曰臣受李煜厚恩只知事李煜未知事陛下上曰李煜已臣妾於朕卿於草野何俟曰臣聞李煜歸命未受王爵臣故不敢歸上聞其言頗近忠赤乃宥之授冀州團練使既數日入授闕命曹翰亦入馬雄方俟恩於外時龔慎儀猶闕等以手版擊之遂闌入殿門穎猶稱臣闕殺上上怒方詰絳等曹翰先鋒被宣歙二郡闕賂之因入奏曰盧絳乃一姦賊陛下存之為國家日後之患矣况冀州乃邉境之郡而使有重權不可上命皆斬之絳呼曰陛下以鐵劵詔臣恕之以死今以㣲罪一旦見殺千古而下且彰陛下之無信上曰朕為龔慎儀殺賊而已何負於卿既出乃呼延賛當視行斬將至梁門絳遂四顧見擁一白衣婦人來宛同昔日夢中所見因歎曰玉真爾何至於此乎賛問其故絳乃白向時所夢將斬之絳曰萬乗帝王斬一偽署節度使可無氊褥乎賛使馳奏上遂賜之絳復問孟家陂持刃者曰斯場是矣因屈指迨今果十年歎曰昔日之夢今果騐矣死復何恨玉眞姓耿氏其夫死與前婦之子通當極法與絳同場斬焉絳孫器有文學今登進士第矣朱令贇不知其先何許人乃大將朱業之從子幼隨業征討初署為小校趫捷善射鷹目軍中號為朱深眼後以軍功累遷為神衛軍都虞候開寶中林仁肇鎮南昌數年卒遂以令贇領其部王師攻金陵令贇於潯陽湖口縛大筏萬艘載粮併軍器數十萬戰艘上具爐炭將斷采石磯浮橋以援金陵既成或説之可乗盛夏江流泛溢時風便其勢迅急可以成之令贇不從至冬遂率水陸數萬進行數日至虎蹲州與王師遇令贇不曉兵機將戰獨乗大航高數十重危簷與親信數千人共載上建大將旗旛指麾而進王師見之聚舟併兵而攻之令贇勢蹙遂將火油機以禦之屬北風急迴熖迸星倐忽自焚燎及大筏於是水陸諸軍不戰自潰令贇力窮投火而死申屠令堅山東人自少無頼好博膂力絶人晋漢間甞為盜犯法州郡械繫入京將至遂賂守曰吾今見獲不死則為一健卒君等皆吾州鄉之人吾與君等别可飲數甌以為永訣時守者皆醉因夜亡歸會賊帥咸師朗等掠淮北衆至千餘人令堅因徃與官軍轉戰殺傷頗衆羣賊勇之後從咸師朗出援夀春與林仁肇應援劉仁贍同破城南大寨及復濠州大栅時勇冠軍中左右奮擊前無勁敵因是録功授神衛軍都虞候後主立益見親任常居侍從開寳五年除吉州刺史委以邉務既至緝理軍事完治城地鎮遏邉鄙頗有節制及建康陷後主委諭至命以順命令堅私約袁州刺史劉茂忠反殺監軍侍其稹割據不降未發而卒令堅未死於二年之間夜不安寢或瞑目夢與人鬭戰徃徃踴而叫呼所畜歌妓十數人常分為二至昏而代自夕迨旦令聲樂歌舞宴飲以獲假寐而已及死之夕若中風狂於室内如與人搏撃踰時而絶矣劉茂忠其先彭城人後世徙居廬陵安城因家焉氏族實繁江南自嗣主委政之後法令彌弛兩地之民互相侵掠不能禁止茂忠自少畧通書史不事産業以豪縱自居結納亡頼剽掠鄉里頗為民害為郡邑所捕屢抵大罪會赦貸死與其徒黨各被械繫於金陵籍為官卒時上江羣盜趙晟蕭榮彭先登數郡聚其徒至百數深濳巖穴出恣暴惡郡邑患之官健不習險阻収捕屢年不獲茂忠乃上言乞就擒以自贖因許之遂亡入晟黨為先倡掠得財帛多推分與之又得術士孤虛壬遯星禽占候風角之書遂伏而習之皆騐衆愈信之因熟徃還與捕吏為内應討平之時廬陵鷓鴣洞有盜呉先者招集亡命剽掠四出郡不能制茂忠用計掩擊殆盡遂斬先持其首詣郡奏授吉州兵馬監押錫賚優厚遣還與郡守繕理城隍戎事整肅復詔入授袁州萍鄉制置使委以扞湘潭之境既至撫輯士庶條明法令精練步騎若指諸掌王師初圍金陵茂忠撫巡界上因與兵縱獵無何逐獸出界而潭人拒之茂忠怒乘勢掠至澧陵而還時潭衡巡撫使祖洎怒其犯境欲襲取之會冬至日意茂忠必醼會乃率步騎及白面潭民數千而至縁邉營栅皆遁望樓烽烟驟起報騎亦至茂忠乃會郡吏議衆洶洶不能謀惟茂忠顔色自若因命酒既數行報騎又至衆請行茂忠笑謂之曰今日將旰如出師於主將不利遂使間道徃設伏兵焚絶橋梁然後躬擐甲胄去寨十里許與潭師遇遂合戰迨晡勝負未决茂忠乃舎騎持大矟深入敵陣所向無前因乘勝急擊衆大奔潰而退遇伏兵橋道既絶赴氷溺死殆盡遂執其副使以軍禮相見後主嘉茂忠功績遷袁州刺史其餘軍佐僚屬進職有差尋以金陵不守後主為虜時吉州刺史申屠令堅結之以抗令堅死茂忠遂降舟次淮口修謁自稱逺州刺史時主嵗者為朱供奉見乃擲刺于地大罵曰亡國之俘何刺史為令具牓帖賛見將上階㕔署吏復叱之令闋衣執仗庭叅既至京師上曰江南被䧟國已亡矣爾何相持之深茂忠對曰臣受李氏國恩惟忠勇是奮雖陛下親征臣亦當殞身不顧太祖見其誠慤待之頗厚乃授登州刺史之任既至未幾㑹前主嵗朱供奉抵罪貶為郡將公見其來亦不之憾令就職日兩衙俾立墀下供奉逾月慚死在郡亷幹頗有政理迨太宗即位枉賭博事露左遷分司西京未幾會赦復資任闕昔茂忠微時其常所持􅘫將有事戰鬭必於宿而鳴即至殺戮乃與潭戰親操奮擊前無堅敵左右中者皆洞胸脇迨百餘輩其膊亦因是負創傷時遇隂霾即加痛楚至是疾作臂不能舉病數日卒追封某官茂忠本名武後改徹以犯漢武諱因改焉在江南日雖軍戎繁劇處置無滯然延接下士不憚儒術皆揖讓周眄詢訪時務無不盡禮門館常盈或時飲宴武僚相侔處袁日郡君生一女居金陵城陷為兵人所掠在師中茂忠使女人入諸營部托鬻衣而竊求之遂表聞取還既至皆喜因暑夕與庭下墩坐茂忠據拐忽見一人自外躍劍刺之茂忠以拐自扞連舉數四拐迨絶刃不能中會左右執之送軍巡司按訊斬之乃昔掠女兵人也初潭師興其間有貪佞好勇者皆先授祖梁署以萍鄉令簿之秩及敗溺不還至今孤幼猶哭且怨茂忠焉江南野史卷十
