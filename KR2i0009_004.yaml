body:
  text: 江南野史卷四宋龍衮撰宋齊丘宋齊丘字子嵩世為廬陵淦陽閤皁山人父誠因巢冦之亂與南昌人鍾傳同起於草野唐王不能制時髙騈鎮淮南遂表傅為洪州節度使尋封南平王以誠為副使卒於任所齊丘因是以為故里焉齊丘少孤好學為文其體頗質樸而無師授授業貧寠遂遊學於諸郡自以世亂乃篤志於商君長短機變權霸之術與之談者皆屈莫能究其涯涘時先主刺昇州其親友饒洞天出守廬陵齊丘因刺謁之與語終日延於門下旦夕相為醼飲因訪時務未幾洞天解郡遂命載歸廣陵未至而洞天疾病且死因遺書薦之於先主既至棲遲逆旅裹餱罄乏因吁嘆數四其鄰娼優女魏氏聞之乃竊賂遺數鍰由是獲備簡幅遂克投贄一見先主賓之以為國士大獲賂遺尋而娶魏氏館而給之因說先主廣延儒素務農訓兵黜陟臧否進用公廉修舉廢墜制御姦雄凡數年間府廩盈積城濠完峻士卒驍勇義父徐温聞之而往而自鎮之乃遷先主刺守潤州未幾温嫡子知訓為朱瑾所殺齊丘乃勉先主帥兵渡江以平其亂冀衛社稷潛立大勲代秉其政若握重兵制禦羣下可成洪業既至遂果代之時吳主既弱政出多門君臣綱紀弛而不振乃修復政理動據禮法務輯民庶罷其不經總以要務寛省征賦農有定制官無虚祿輯睦公族撫存將校優給卒伍爵賞有功刑辟中度斥捕攘冦上下咸乂皆齊丘帷幄之謀焉又說以虚懐待士博訪藝能遂立延賓亭招納賢豪以敦著時望復創一池中立亭宇每與先主登臨乃屛絶人跡以議家國或至夜艾今池亭猶存焉先主欲致之重位然為温所忌遂署為府中從事温卒始拜右司員外郎復授諫議大夫兵部侍郎居府中日議庶政乃使人於淮上延接北土歸義之士大夫孫忌韓熈載等數十人皆以仁愛惠義致之推以心腹故得人莫不樂為之用齊丘自揆以草野之人遭逢英傑言聴謀從身居顯位儒家之榮於斯為盛遂告歸豫章改葬既退身卜居九華山下表乞致仕吳主累召乃數上表固辭其略曰昔髙宗之夢得說西伯之獲非羆是皆天錫之英傑况臣非築巖之相釣渭之賢祿位彌重才力莫稱宜居山野云云時嗣主已為大將軍先主使齎呉主詔親往慰諭優辭敦勉彌畱旬月然後乃起方舟並濟好狎如友既至先主喜分約父子授中書侍郎遷僕射平章事先主位望崇重基構彌隆因謀為禪代乃請先主移鎮金陵以基王業交結鄰好綏恱守宰廣覃恩施撫輯逺邇吾輔元子觀其間隙以待乎時然吳主恭默勞謙人心未殆而宫禁之内嬪御貴戚謦欬嚏鼽之㣲齊丘莫不知之隂以聞建康議以劉穆之輔宋主無以過之呉主忽謂左右曰孤克巳雖勤為下所奉然為徐氏制馭名存實喪今欲求為一田舍翁將安所歸乎遂泣數行下齊丘聞之乃還建康議遷都金陵吳主既半渡遂引至潤州安置號丹陽宫未幾使諷吳主禪位先主既膺禪位齊丘復請歸姓以紹唐統冀以徳威四方遂遷左丞相司馬元勲乃就國步既安因表罷相庶崇止足以避賢能遂除洪州節度使既至州乃召故老親屬相與叙情舊飲宴彌厚溥霑饋遺乃改舊里愛親坊為衣錦坊更易弊政補緝郡條庶民便利莫不榮之迨先主疾篤詔還受顧命託以後事嗣主立加太傅以前官相之嗣主襟量仁懦言幾玩狎恭已無法大失統御或深居宫禁全忘宵旰齊丘毎犯顔諫正陳以昧旦之道馭朽之危又欲捐社稷傳位於太弟於是上疏論及先主創立之艱憂勤之重極諌不從未幾以齊丘為潤州節度使自是左右侍從皆東宫白面少年儒流雅士韓熈載之徒多肆排毁以先朝老臣終不為少主所用嗣主顧盼頗見慢色齊丘知之求罷其政但奉朝請而已年既衰暮自負勲舊不能折節降身隨時容衆為鍾謨常夢錫江文蔚蕭儼等承非順㫖尤生謗讟乃嘆曰鳥盡兔死則弓藏犬烹矣因表乞歸九華舊居嗣主與左右皆以為詐激要君上乃賜號九華先主封青陽縣公食一縣之賦至四年嗣主命齊王景達就詔與俱還建康亦奉朝請而已至六年又出鎮洪州九年復詔還拜太師固譲十一年復往南昌十三年周師入淮甸詔還謀難始齊丘賜號歸九華朝廷多用文儒以干戈為戲屢征閩建復討湘沅外乏師旅内竭帑藏國用軍器蕩然虚匱淮甸疆境棄如土芥養老乞言以為迂典諮議詢謀恥而不行國師暴至遂失備禦方詔還議軍事未至以劉彦貞為都統出援夀春齊丘聞之曰斯乃蹴踘射帖之徒焉能總衆以禦勍敵辱國喪師必是行矣既至因表乞急詔還彦貞聞之狠愎而行未幾果沒復以朱元又叛諸郡皆陷選將閱師稱藩割地皆非専謀復告老謝疾乞骸骨歸南昌既而嗣主自亡淮南神情躁撓慌悸不安常曰孤欲屣脫國務放心雲鶴每思寄託恨未得人時陳覺李徴古等常見親宻因順㫖而言齊丘先朝夙老諭家造國四方所知若委之國事俾繼伊旦陛下暫輟萬機髙宴深宫俟睿體隆寧歸政何晩又會鍾謨北使返遙稱世宗曰朕與江南分義既定然宋齊丘不死殆難永保和好合朝順非遂成釁隙因是貶殺覺等時齊丘不知其㫖乃具艫艦被詔促遣歸九華既至遂絶糧七日而卒齊丘昔嘗著啟有曰至於千懇萬端只為饑寒二字人見其死謂之自䜟齊丘所薦進者惟能先萌未兆智䇿宏逺才堪致化理能易俗與已合志同方者乃授拔擢凡數十人名皆顯達貴厯朝廷豈以尋章摘句戕賊經史殘剝古人之詞為文士者哉故齊丘之學天才縱逸穎出超羣混然而得非耗蠧前修而為之辭至如鳳臺山亭詩延賓亭記九華三表有古儒之風格化書五十餘篇頗幾於道家凡建碑碣皆齊丘之文命韓熈載八分書之熈載嘗以紙實其鼻或問其故答曰其辭穢而且臭時見謗誹多此之𩔖齊丘嘗與先主議選宫嬪雜以珠貝羅綺使之泛海北通契丹欲復中原而遼主耶律徳光使至厚幣遣還迨至淮北乃使人殺之復遣沿海齎琛以為報聘遼主不知謂北朝殺己之使因漸構隙前後如是者數四於是徳光大怒數冦邊境及晉少主御極與之抗禮遂入梁園遣使召江南主與之會醼嗣主謙抑辭而不行故周世宗初征淮南詔書云結連幷冦與我為仇勾誘契丹至今未巳皆齊丘之始謀也或云契丹母青媛乃江南之嬪且當嗣主懦躁輕肆失言陳覺之徒謟諛率爾詭對不能慎其樞機禍及正人亦非夙心素志同誠恊謀復會鍾謨籧篨讒慝交亂庸君九華之墳土未草而謨亦繼誅蕭儼以䝉瞽無文戅而愎訐江文蔚詞賦常品學非博通常夢錫以帷箔之内糅雜不修韓熈載淫而無行縱誕不持豈能知變識機立功定業當齊丘秉政蒞任皆斥腐儒鯫生聲洿行穢故不大用及位已崇峻由是哆于頰背憎面譛羣誣黨議十舌百喙加之齊丘性度不能洪綽襟器斗筲茍不附己莫之容忍汪台符譏其名字潛沉深淵初鎮南昌日有故識慢言遂致之大辟乃牓其尸曰毁辱先主謗訕今上亂臣賊子宜棄諸市斯亦可謂管仲之器小哉初囚九華乃命筆作老牛歌以獻為忌之者所匿今猶𫝊於人口將死謂人曰吾昔幽囚楊氏於泰州無一聊生吾之罪也然今一死故無所恨遂自縊而卒年已七十餘矣有一子先世而亡江南野史卷四
