body:
  text: 江南野史卷一宋龍衮撰先主江南先主姓李名昪字正倫其先唐憲宗之子建王恪之後祖志授署為徐州判官卒於任所父榮有器度不事産業每結交豪傑以任俠為事屬時亂離羣盜蜂起朱梁統制天下而楊行宻専據淮南榮乃感憤欲圖興復之志然無少康一旅之衆數區十里之地久之聞賊夏韶之衆甚盛欲因之以成大事既往而說韶曰僕大唐之後少失怙恃遭世多難先祖基業蕩然横流為人所有自料以髙祖太宗之遺徳宗祧社稷未必杜絶其間子孫必有興者吾雖不調夙藴壯志聞公英雄士卒勁勇吾欲因公立事共取富貴茍成霸業古言魚水未足為喻韶感其言於是從之遂率衆自海入淮轉掠沿岸郡邑至濠梁間衆至數千人軍勢頗盛郡邑與戰多為所敗行宻聞之因自帥師攻之數敗乃為所擒因捕其家盡誅之時先主方數嵗且異常兒濠上一桑門與行宻有故乞收養以為徒弟後行宻部下大將徐温出師濠上見先主方顙豐頥隆上短下乃擕歸為巳子先主雖少而天性穎悟夙敦子道朝夕起居温清左右承顔侍膳過若成人及遇温戚屬皆能俯躬迎奉温婦見之而頗鍾愛撫養無異逮十餘嵗温知其必能幹事遂試之以家務令主領之自是温家生計食邑采地夏秋所入及月俸料或頒賜物段出納府廩雖有専吏主職然能於晦朔總其支費存畱自緡疋之數無不知其多少及四時伏臘薦祀特腯饌珍餚賓客從吏之費槩量皆中其度逮嬪婢嬖姥寒衣御紈綺幣帛髙下之等皆取其給家人之屬且亡間言温之嫡子皆好騁田獵先主唯習書計暇則肄射所志必精遂用徐姓名知誥既長温為娶其婦亦能奉蘋藻致柔順之美温嘗卧疾唯先主躬侍左右至於糞溺皆親執器動至連月踰時扶掖出入或通宵達曙曾不解帶或夜聞謦欬聲乃率婦同往者數四温於帷間聞人至則問曰汝為誰耶對曰知誥在斯又問曰彼更何人對曰知誥之婦温見其篤於孝養而復能幹家知非常品而諸子難及乃曰吁汝雖異族然吾無親疎先主聞之侍奉愈謹未幾温起先主婦卒温知其篤孝為之感嘆久之温指侍右一姬謂先主曰此必有福自歸吾家而門户長溢不啻數倍汝可婦之奉汝箕帚遂生嗣主及諸王後温凡出征討而疑其帳下故先主常得奉侍遂習熟武事因能騎射起家為偏將㑹宣州叛亂時温已秉軍政遂命大將柴再用討之以先主監軍事既至乃帥部下先擊之賊平先主功居最遷昇州刺史時諸郡皆以兵甲為務而先主専尚文儒延納多士未幾會親信饒洞天薦南昌人宋齊丘一見與語終日館於門下朝夕諮訪政治齊丘遂説宜頒布六條以率羣吏定民科制勸課農桑薄征輕賦禁止非徭在任十餘年民庶豐實郡邑安堵禮律修舉庶位公廉城郭濬固軍器充積兵士輯睦人樂為用義父温聞其完葺乃以嫡子知訓居廣陵輔政來自領之遂移先主刺守京口未逾期而知訓為大將朱瑾所殺初知訓秉政朝廷譽之為昌華相公因是輕肆驕傲辟命卿將鎮戍藩翰多所不道瑾頗銜之瑾為人悍毅勇敢決烈獨任唐末屬朱梁簒逆瑾為郡守拒命不從梁師累征不克會其兄珙以别郡先降梁祖親討瑾乃遣珙於城下諭令歸順瑾大怒乃偽開壁請與兄面語遂飛刃刺殺兄梁祖惋嘆攻圍愈急遂亡歸淮南時人壯之呼其小字為朱憨哥瑾既殺知訓乃持其首詣吳主主曰他有父在非孤敢聞卿善自為謀瑾乃大呼於市朝因欲作亂時無附之者遂自剄先主乃帥部下渡江以定亂瑾已死吳主遂委政先主遷左僕射㕘政握兵權軍中之事莫不已出越人冦毘陵先主以府兵拒之大戰於無錫越人奔潰隣境之内唯錢氏為仇因是與之和好兵甲遂弭乃傾意折節奉上接下禮待將校推其慈惠致之腹心以寛簡優柔存恤驍勇夙将元寮素所跋扈者無不樂從互與歡飲士民富實桴鼓不聞朝廷頹綱以禮振舉上下既乂逺邇樂推呼之為政事僕射大江南北封境之間二十餘年治平如砥乃治府署之内立亭號之曰延賓命宋齊丘為記以待多士於是四方豪傑翕然歸之或因退休沐之暇親與之宴飲諮訪闕失問民疾苦夜央而罷時中原多故名賢夙徳皆亡身歸順乃使人於淮上以厚幣資之既至縻以爵禄故北土士人嚮風而至者殆數千人羽翼大成禆佐彌衆或人譛先主於義父温曰軍國大政請以嫡嗣持之不得假於他人先主聞之乃表乞罷政務而宋齊丘諫之請緩其事迨數日會温發疾卒遂止其議時義弟知詢代嗣父温鎮金陵遙總朝綱每與先主争衡因使説之入朝遂以吳主之命畱而不遣罷其政權由是先主始獲専任朝野歸附位望日隆遷侍中中書令守太尉諸郡軍事遂襲温故事出鎮建康以長子璟參政進封先主為齊王加禮建齊國置百官以宋齊丘徐玠為左右丞相遂受吳禪奉呉主為譲皇徙居丹陽宫改吳年號為昇元元年尊義父温為武皇後為義弟知詢等請歸姓先主猶懐徐氏鞠養之惠不忍改之百官堅請於是復姓李氏立大唐宗廟祀髙祖太宗而降追尊四世祖恪為孝静王奉考榮為義祖封徐氏二子復為王諸孫男女各為郡縣主百官進位有差乃郊祀圜丘禮畢羣臣皆賀復上尊號遏而不行郡邑報符瑞數十亦止而不書以丞相宋齊丘為洪州節度使將行請使通好契丹遂以宫女繒綵珠璣遣泛海而行明年蕃使亦至於是交聘往來者不絶是時江淮無事累嵗豐稔兵食盈積而梁宋屢亂而羣臣咸言土運中興宜復先代疆宇之舊其嵗吳越災焚其宫室府庫兵甲殆盡羣議請乗其敝諸將奮勇者頗衆先主不納遣使唁之厚饋幣粟以賙其乏殆將假而率之以入中土未幾㑹先主疾篤使召宋齊丘受顧命託以後事長子吳王璟嗣位即日殂於正寢時昇元七年年五十有六諡曰孝髙廟號烈祖先主身長七尺姿貌瑰特目瞬如電語音厚重望之懾人與語可愛少遭迍難長罹兵革民間疾苦無細大皆知之刺建康有處士汪召符上書陳九患利害之説皆親閱覽窮究臧否不恥下問稟而行之自登位之後遣官大定檢校民田髙下肥磽皆獲允當人絶怨咨輸賦不稽然而仁孝之誠頗動天地圜丘之祭太史奏月延三刻是時上旬月當三更而沒升壇之際皎然如日禮畢而落時饒州餘千民母因抱擕其孫失手墜地其子怒拔刃斫之刃且未及自腰而下忽陷於地先主遂命作闊刃鏟之又吉州豪民龍氏鬻穀而不售上神岡禱廟求旱為暴雷震死迨末年慤敦慈恕山林藪澤禁止以時恩澤渙汗及被吾民曰民各生父母安用争城廣地使之膏血塗於草野乎自握王權至禪位凡數十年止一拒越師盖不得已而為之將終乃謂嗣主曰徳昌宫凡積兵器緡帛七百餘萬吾死之後善和好鄰境以安宗社不可襲煬皇之跡恃食阻兵自取覆亡茍能守吾言汝為孝子百姓謂汝為賢君矣殂落之日四方黔首嘆息涕泣而輟其食初有禪代之志忽夜半寺僧撞鐘滿城皆驚逮旦召問將斬之云夜來偶得月詩先主令白乃曰徐徐東海出漸漸入天衢此夕一輪滿清光何處無先主聞之私喜而釋之又天祐中諸郡童謠云東海鯉魚飛上天東海徐氏之望鯉與李姓音同也天時人事冥符有如此者也江南野史卷一
