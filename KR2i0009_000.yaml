body:
  text: 江南野史載記類提要臣等謹案江南野史十卷宋龍衮撰其書皆紀南唐事用紀傳之體而不立紀傳之名第一卷為先主升第二卷為嗣主璟第三卷為後主煜而附以宜春王從謙及小周后第四卷以下載宋齊丘以下僅三十人陳陶孟賓于諸人有傳而查文徽韓熙載諸人乃悉不載考鄭樵通志略載此書原二十卷此本僅十卷殆佚其半歟叙次冗雜頗乖史體然其中如孫晟林文肇諸傳頗有異同可資考證馬令作南唐書亦多采之流傳既久固亦未可廢也乾隆四十五年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0cbfd280ee5b8a690a400f45a2b0eb68383c2b5196769a46d62ecb273dbc7559
