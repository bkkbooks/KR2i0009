body:
  text: 江南野史卷五宋龍衮撰孫忌劉仁贍陳誨鍾謨朱元孫忌者本名晟山東齊郡人少家貧力學能屬文朱梁主舉進士會莊宗立號河北招募河南仕人忌因亡之署為著作郎直史館莊宗滅梁遂都於洛迨明宗嗣位以莊宗蕃漢馬步使朱守殷出鎮汴州辟忌為判官遷員外郎守殷猜之懼不能自安忌因說之叛明宗使安重誨攻之城陷守殷伏誅忌乃窘迫落髪為桑門將亡淮南時圖像索之頗急至正陽未濟追騎適至疑之乃踞岸偽捫蝨囓蟣追者睥睨久之乃去忌方獲渡至旅邸翹坐先主常使親信於淮頭竊覘過客見忌姿儀偉重有異常僧乃走庭下喏之忌端然不答逆者知之乃聞先主使人迎置門下優容禮問忌以實對遂令畜髮冠帶後從先主渡江署節度巡官彌見親寵每至宴談迨旦迄夕與徐玠同預禪代擢拜翰林學士知制誥文辭亹順優婉而古尋遷中書侍郎才宏口辯詞說泛濫嘗為宋齊丘所忌憚迨嗣主即位素所畏重累遷右僕射平章事與馮延己俱相頗有志於重熈富庶燮育疲民時已下湖南忌白嗣主楚國兄弟自取敗亂其民何罪使之困瘁且解桂林益陽之師以節鉞授劉言使自安輯冀惠有衡潭之地則二藩在吾彀中爾延己狠愎不識大體不然其議未幾劉言果襲取長沙邊鎬棄城而走忌鄙延己謂人曰玉巵象甌内盛狗穢雞樹鳳池棲集梟翟遂求罷相嗣主許之未幾會周師攻淮甸劉彦貞等全軍陷沒劉仁贍固守夀春嗣主懼遣忌與王崇質鍾謨李徳明相次奉表稱藩請和周世宗畱忌等使徳明反命請割淮南十四郡以江為界朝議不從殺徳明遣齊王景達陳覺朱元等救援夀春與周人屢戰會朱元叛軍遂遁惟仁贍堅守不下世宗怒江南失約遂引忌責之及話江南事實忌對以兵甲尚强宋齊丘良相也乃致忌於樓車令呼仁贍趣降忌知終無生還之理不忍負國家恩顧至城下乃反其辭大呼曰劉仁贍汝固守城池江南救援即至我遇强暴死在旦夕汝可効死立忠無為降虜使我羞於泉下左右交擊其口忌顔色自若世宗怒將殺之臨刑整衣冠望南而拜曰臣不忘主恩謹以死謝遂斬之忌家先為明宗所誅過淮娶嫠婦髙氏乃燕公騈之少女無子有隨婦子李紹慶嗣主優秩以慰之追封中書令魯國公劉仁贍者濠州刺史金之次子也少習兵法起家如小將性淳謹器度偉重喜怒不形於色總領兵士嚴而不殘有良將之才出典郡符剸治無滯有政績能名軍民樂其仁信詔入為天威軍都虞候常直宿衛復出江夏作鎮長沙之役師舟刺安撫郡邑士民服從入典禁兵甚見親任保大十三年出鎮夀春未數月會前監軍使奏罷冬月沿淮把淺屯戍饋糧仁贍奏以邊境備禦弛廢乞分重兵以防不虞未報周師奄至城中將校軍吏皆撓懼不知所措仁贍按行城壘分兵指授守據要衝視如閒隙衆心遂定劉彦貞援軍既至將追周師仁贍固止之曰北人姦詐恐其設伏故宜按甲養銳以俟其隙彦貞性本佻侮不習兵術乃曰賊聞吾至必先遁走所謂縱敵武士之恥也不追則貽患於是奮行果為所敗自是羣下咸服其料敵各勵死力以聴任使周世宗師衆四面攻擊仁贍支吾拒守經年不能下遂與禆將破城南大寨斬獲數千級北人大懾又表邊鎬代已守城自帥兵決戰冀定得表嗣主畏懦惟加撫諭不從其表因憤恚而疾其子謀叛遂命立斬監軍使周廷構哭而救之亦令幷誅之及周世宗以樓車載孫忌於城下趣令仁贍納降而孫忌反其辭大呼仁贍曰汝可固守城隍効死立忠無為降虜等語士卒聞之益勵志奮勇心堅鐵石仁贍猿臂善射發無不中一旦世宗親臨城下坐帷中觀戰士攻城仁贍自上城射之矢去御座數尺輒墜左右驚愕咸諫請少避之世宗乃曰一箭射殺一天子天下寧復有天子乎遂命左右進牀坐于墜箭之上甫坐矢復至又逺數步而墜仁贍知之因捐弓投矢謂左右曰斯乃天也非吾不能中之吾世受國恩兄弟門列􅙶㦸數人然不能治危扞敵寧静邊境貽憂君父吾且恥之今雖病猶能奮力執戈與諸君背城血戰死於旗鼓之下乃吾之分終不以大丈夫之節屈身以事二姓矣久之世宗駕亦起仁贍疾彌加不能視事副使孫羽等懼不能謀遂以城降世宗嘉其忠果使舁至親自慰諭授以節鎮之任仁贍不起以手指口而卒時日隂曀天雨黄沙士卒聞之人人莫不銜泣而哭之曰上天不仁而使吾父死也何用生為自剄者數十人初仁贍厯嵗久周師攻之不克世宗城淮北為壽州迨仁贍死乃以故城為夀春縣君子曰以周世宗之神武雄斷當矢石而不懼厯觀古帝王之達者一人而已況太祖太宗躬總元戎而蕞爾彦貞可禦諸乎仁贍死未逾月而淮上兵起其能得士卒之心故樂為之用命若非良將又焉致之陳誨者建陽人生而期月足勁能履父母異之小字阿鐵為人勇敢足膂力長而任俠仕至郡禆將軍中壯之呼為陳鐵諸軍圍建州誨每出戰前鋒懼之難與為敵及城陷為王建封之衆所獲將釋縛斬之自踴出於羣衆執者不能制追之不及乃奔查文徽軍中文徽素已知其驍壯遂以為小將俾領其舊部招集亡叛復與潘承佑薦於嗣主以為劒州刺史及征福州李義誨為前鋒大破之獲其将馬先進遂遷建州節度使委鎮邊境復有吏幹兼治農戰軍民化服及周師入淮甸誨遣長子徳誠引卒數千赴難於夀春諸將戰多不利喪失師徒惟徳誠出入堅敵未嘗少挫鋒銳班師之日獨賞其軍旌之為百勝授以和州刺史徳誠自少好學才兼文武有能詩名後累刺池䖍為郡有政績故誨之爵位累至同平章事在鎮數年多薦儒耆甄升將校時議多之因疾求罷後主召至建康疾篤親臨其第視問慰勞即日而卒其諸弟輩一皆官至顯位焉鍾謨會稽人徙居建安博學善為文章嗣主愛之遷自末品寵任異常轉至吏部侍郎謨為人謟諛佞媚反覆難信復多妬忌及奉使使周為周世宗所善使歸諭㫖乃擅自益加諸潤色常以籧篨為陳覺所排少與李徳明親友頗怒覺等樹黨攻之固求北使覆騐覺言嚴續之事往來數四嗣主不能揣悟事理獨任偏辭貶殺覺等釁加元老自謨始之也時議以嗣主使鍾謨覆實而殺覺若使覺覆騐必殺鍾謨也及遷禮部侍郎知當事主者之在多換其彀權勢巍峻尅剝侵官百司之務多出於已李徳明之死唐鎬輔其謀至是鎬懼不自安會信州刺史張巒入衛謨素與善毎詣謨第輒屛左右而語或至夜分鎬知其隂構之謀及太子冀卒子幼從嘉乃冀同母弟當立謨與第七子紀公從善同使北朝尤胥優狎頗相稱譽因白嗣主言從嘉志徳俱涼非社稷之寄盛稱從善器度崇偉真神人之主嗣主由是積怒不已逐於饒州尋殺之謨始殺陳覺迨唐鎬除謨罪亦見誅不亦宜乎朱元者蒲津人在本府節度使李守貞為從事周太祖輔少主將禆代守貞不從太祖帥師圍之急乃使元洎李平奉表來乞師嗣主以潤州節度使李金全為北面行營招討使與劉彦貞查文徽魏岑等將兵救之聞其城陷而守貞自焚乃班師因是署以文資與平累遷至尚書郎及周伐淮南諸郡守將皆遁時元帥衆萬餘克平舒州會元帥齊王景達與監軍陳覺有隙疑其將叛遂宻表請遣元詣濠州議事元聞命恐為覺所害將叛其禆將時厚卿不從元殺之至紫金山將戰遂以所部降於世宗於是諸軍大潰景達陳覺亦奔還嗣主怒議斬元妻子元妻乃查文徽之女文徽屢表雪之誠欵懇切嗣主署其表曰只斬朱元妻不殺查家女文徽乃無詞世宗以所叛之衆别作一營以元為蔡州刺史江南野史卷五
