body:
  text: 江南野史卷八宋龍衮撰江夢孫陳陶史虛白孟賓于孟貫江為江夢孫字聿修九江湓城人祖禰不仕以儒道自高夢孫少𫝊先業頗藴經義旁貫諸書籍籍聲譽逺近崇仰諸生弟子不逺數郡而至者百人春誦夏絃以時開講鼔篋函丈庠序常盈先主輔政欲廣賢良之業聞其學術遂以幣帛聘之數四不得已乃起既至為芸閣郎甚被親禮委之薦進時為得人迨數年忽自陳曰僕少長白屋頗知民間利病邑宰之政可以存革深弊願効一縣庶竭愚鄙先主不許曰令長之職徒勞之甚與臺閣之資清要不同夢孫曰茍獲所請無憚勤匱先主見其懇廹求且不已遂授近畿天長令既至縣吏告不寢大㕔妖怪所憑前令居之不夕而死請止便室以避其㐫夢孫不從謂曰茍如是我自當之遂居焉既夜半果聞呼嘯而至漸逼近則掀投床几復扣門户且召令出夢孫卧聞答之曰諾乃整朝服秉燭出户爇爐奠爵而祝曰不知何人輒敢召令令為民長必有正㕔以御羣吏汝或為神必當受民祭祀理合聰明正直與百姓為福何乃非禮與王者之宰争居其地驚撓正人况吾以忠事主以信示人所為不二寜畏於汝汝若不悛其過乃更為厲則日月星辰昭晰於天吾當具奏請行誅戮雖汝後悔不亦晚乎由是閴然其怪遂絶於是召鄉里高年存問疾苦蠲其非征任其便利有害於政者必表罷之見官槽有馬因問之左右對曰昔部民競之窮按道理各有所據前令未能區别遂繫於官且二年矣夢孫曰今固亦爾吾聞管仲之馬識道王恢之馬知其故第遂命縱二馬於郊外任其所如隨之以覘焉其馬乆縻棧皁得解羈束遂奔逸數十里果入一主之家其訟遂息先主聞之彌加優奬未幾稱疾而罷先主曰夢孫果賤宰邑之卑不能乆居乃命代還邑之老幼遮道乞留殆十數里至都一見即辭歸鄉里先主固留不止既還家門生弟子復至乃率身耕稼躬事繼母旦則冠帶入問温凊親饋飲饌退更常服力操耒耜耘耨暮歸則易衣侍膳畢然後就庠序集門生弟子説釋經義一如徃時有生徒請之曰吾聞三百篇經聖人所刪定致逺而泥然其間何謂兄弟䦧于牆如是則聖人使人䦧於内而後禦止於外也夢孫徐應之曰大哉子之問乎此疑為閴字似乎非䦧當時竹簡訛闕傳之者悞亦猶春秋書閏月者之義也又拱而立曰夢孫昧學不敢輕議其㫖諸生宜自取其長焉其為人敦上謙下有如是者時號為搢紳先生一門百口敦睦如一子孫學業各授一經孝禮兼持江左稱之為最卒年八十有五葬之日自逺方至者幾千人而服縗絰徒跣者百許嗣主聞之美其才茂徳逸故贈國子司業優賜𦵏物其後門人弟子仕途强半通顯者初夢孫解職而歸有羣盗謂有資鏹遂掠其家夢孫聞其至巾帶迎候使烹犬豕為設飲食於盆盎中疑其懼鴆不食乃對之先飲匕甌更㗖數臠然後與之食畢遂罄所有寒燠衣襦襴袍器皿之𩔖盡致之既行見一鼎葢尚在夢孫曰彼若遺此乃為不具之器遂遣與之羣盗皆驚歎曰吾輩小人實輕凟君子是夜還置其所剽之物於門外而去夢孫啟户見之一無所失焉陳陶者世為嶺表劍浦人㓜業儒素長好遊學善解天文頗長於雅頌自負台鉉之器不為干託既至南昌謀徃建康聞宋齊丘秉政凡所進擢才彦名非顯逹自計與齊丘鑿枘終不克納必為所屈乃幡然築室居西山以吟咏自資㑹齊丘出鎮南昌有蒲鞍之覬乃自詠曰中原莫道無麟鳯自是皇家結網踈陶少與水曹任畹相善又寓之詩云好向明時薦遺逸莫教千古弔靈均嗣主知而未及辟之會彗孛且見陶乃歎曰國家其幾亡乎遂失淮甸嗣主南幸以兾茍免迨至落星灣諸將欲徃問而陶所居不與俗接惟嗜鮓一㗖或至千臠遂使衣商賈之服齎鮓徃見既至陶即時而出乃問官家龍舟將抵何處對曰已逹落星矣因問陶曰星可避耶對曰星落不遷何俟嗣主躁急不俟反命已至南都既數日詰旦忽殿庭見殘獐一脚視之乃獸食之餘詢宿衛莫知攸底遂徃詢於陶陶曰昨夜乃狼星所直故爾嗣主歎曰真鴻儒矣將召見㑹嗣主殂後主即位知其運祚衰替遂絶搢紳之望以修飬燒煉還丹為事有詩云乾坤見了文章懶龍虎成來印綬踈又云磻溪老叟無人用閒列查棃校六韜又曰近來世上無徐庶誰向桑麻識卧龍陶所遁西山先産藥物僅數十種開寶中嘗見一叟角髪被褐與一老嫗舁藥入城鬻之獲資則市鮓就爐二人對飲且㗖旁若無人既醉且舞乃歌曰藍采禾塵世紛紛事更多爭如賣藥沽酒飲歸去深崖拍手歌時人見其縱逸姿貎非常每飲酒食鮓疑為陶之夫婦焉竟不知其所終或云得仙矣史虛白者山東人世習儒業長而富於文與昌黎韓熙載友善唐晉之間中原多事遂相與渡淮㑹先主輔政偕詣建康聞宋齊丘總相府事虛白乃放言謂人曰彼可代而相矣齊丘聞而俚之然欲窮其伎乃命寮屬宴之以倡樂賦之以牋翰使女奴玩肆多方擾之虛白談笑獻酬筆不停綴口手應接曾未暫滯衆不能屈乃延入與語政治多引伊吕湯武之説齊丘之志在霸術以為虛白迂畧機務乃引見先主説之曰今君據有江淮摘山煮海人庶豐阜京洛之地君家先業今且亂離人思舊徳君茍復之易若屈指先主雖喜其説然以初基方輯睦隣境未暇他顧與韓熙載並署州郡從事聊以羈縻俟更大用而虛白意頗不平耻其前言之失因襃博衣冠縱檝南遊至廬山與佛老之徒躭玩泉石以詩酒自娱不干世務乆之嗣主即位韓熙載薦之詔至金陵命登便殿宴飲與之計事虚白曰臣草野之人漁釣而已邦國大計不敢預知因醉溺於階側嗣主曰眞處士也遂賜田五百畆遣還迨十年嗣主幸南昌既至星子渚復使召至問曰處士隱居必有所得乎對曰近得漁父一聨乃命誦之虛白曰風雨掲却屋全家醉不知嗣主聞之為之變色賜粟帛遣還未幾而卒有二子次舉進士長早喪孫温咸平中擢登進士第孟賔于湖湘連上人少修儒業早失其父事母以孝聞長好篇詠有能詩名天祐末工部侍郎李若虛亷察於湘沅賔于以詩數百篇自命為金鼇集獻之大為稱譽因採擇集中有可舉者十數聨記之於書使賔于馳詣洛陽獻諸朝廷皆為數之其譽藹然至明年春與故李司昉同年擢進士第尋屬喪亂遂歸寜親數嵗天策府馬氏辟為零陵從事及江南攻下湘湖賔于隨馬氏歸朝嗣主授以豐城簿尋遷淦陽令因黷貨以贓罪當死㑹昉遷翰林學士聞其縲絏以詩寄賔于云㓜攜書劍别湘潭金榜標名第十三昔日聲名喧洛下近年詩價滿江南長為邑吏情終屈縱處曹郎志未甘莫學馮唐便休去明君晚事未為慙後主見詩貸之復其官未幾求致仕隱於玉笥山自號羣玉峯叟與道家者流遊處迨朞年後主以水部員外郎起之金陵䧟賔于遂歸老連上時吉守祕閣郎馬致恭送以詩其斷章云今日還家莫惆悵不同初上渡頭船既而歸未幾卒年八十餘矣賔于嗜賂出宰縣邑未嘗一處無贓汚徒有詩名人以是少之初賔于入江南生子名曰歸唐少亦能詩就廬山國學遂得瀑布詩云練色有窮處寒聲無盡時鄰房儒生亦得此聯遂互誦其句助教不能理因送江州各以全篇意勢定之而歸唐較勝大為時賢所仰遂廕授秘書省正字出為吉州民掾歸于京師累遷大理丞後以罪貶袁州司戸卒孟貫世居嶺表為建陽人少好學出遊廬山與江洎大諫楊徽之同學友善故徽之詩集中多與貫為者顯徳中周世宗征淮南幸廣陵貫潜渡江以所業詩一集於駕前獻之世宗覽其卷首貽樓隱洞譚先生詩至不伐有巢樹多移無主花乃宣貫曰朕以元戎問罪伐叛弔民非懼强凌弱何有巢無主之有然獻朕則可若他人卿應不免矣遂釋褐授官後不知其所終焉江為者宋世淹之後先祖仕於建陽因家焉世習儒業少遊廬山白鹿洞師事處士陳貺酷於詩句二十餘年有風雅清麗之度時已誦之時金陵初擬唐風場屋懸進士科以羅英造為遂入求應然獨能於篇什詞賦策論一辭不措屢為有司黜為因是怏怏不能自已乃還鄉里與同黨數十家結連欲叛入錢塘㑹其同謀上告郡縣按捕得其逆狀盡誅之將死猶能吟詩以貽行刄者初嗣主南幸落星灣遂遊白鹿國庠見壁上題一聨云吟登蕭寺旃檀閣醉倚王家玳􅈘筵乃顧左右曰吟此詩者大是貴族矣於是為之集時輩慕重因此驕縱謂可俯拾青紫矣江南野史卷八
