body:
  text: 江南野史卷二宋龍衮撰嗣主嗣主名璟字伯玉先主長子年始十嵗出為郎遷諸衛將軍典領軍事先主出鎮金陵以國政付之轉兵部尚書㕘政事明年亦赴建康拜司徒平章事知中外諸軍副都統先主受禪封吳王諸道元帥改封齊王尋嗣位乃改元為保大尊母宋氏為皇太后妃鍾氏為皇后以太保宋齊丘為相封三弟景達為王未幾告將禪位於東都畱守景達固讓不許給事蕭儼極諫不聽封長子冀為南昌王是嵗䖍州妖賊張遇賢作亂皆絳其衣時謂之赤軍子襲取南康衆至十萬餘䖍守輕之帥兵屢擊皆失利衆奄至空山去城十餘里為營嗣主遣將討之連破賊衆遇賢懼棄衆而走獲其副黄伯雄斬之是嵗下令中外庶政並委齊王景達參決唯樞宻使魏岑查文徽得入白事餘非召對不見宰相宋齊丘上疏極諫不聽其畧云臣事先朝迨三十年每議論之際常恐朝廷百官之中有忠赤苦口之人壅蔽不得達其意懇今始即位而不與羣臣相見是陛下偏専獨任是聖特賢而已是以古之帝王一人不能獨聞故假天下耳以聽一人不能獨明故假天下目以視故無逺邇羣情世態不必親見躬聞而可得而知之盖能延接疎越異方之人未嘗隔絶也今深居邃處而欲聞民間疾瘼艱苦猶惡隂而入乎隧道也然臣老矣墓木亦既拱矣桑榆之景而可得以旦乎於是黜齊丘為潤州節度使既行朝廷有位者咸竊排毁言與親信陳覺等樹朋黨嫌隙自此始矣齊丘因乞歸九華舊隱遂封為九華先生議征建州王延政與福州兄延羲有隙遂各稱帝改正朔更相為亂嗣主使諭以祻福各不從阻兵相殘復會查文徽素知閩建山路險易遂以邊鎬與文徽帥師討之復遣祖全恩將兵至建陽建州兵亦隔水而陣因以建州降將孟堅引師自後攻之建人大敗退保其城時福州民李義殺延政之子自稱畱後遣使納欵降嗣主使以義為福州刺史延政由是師益失援遂平建州執延政以歸封鄱陽王鎮饒州自是汀泉漳等州皆降是嵗改建州延平津為劍州以建州禆將陳誨為劍州刺史遣齊王景達徴九華先生宋齊丘與之俱還崇奉朝請而已是時福州李義専據其地叛乃詔建州防戍討之及命信州節度使王建封同圍福州義初求援於越越以舟師浮海而至馮延魯縱之登岸而不能禦敵越人乃出李義家族將棄其城㑹王建封先揚言曰吾軍敗矣燒營而遁諸軍相顧而潰嗣主歸罪延魯使鎖至建康遂流於舒州是時遼主耶律徳光陷汴梁遣二使來告其价言語通於中國嗣主問其故曰臣本范陽人厯世冠冕仕郡為從事昔後唐清泰主失御晉髙祖以太原叛與契丹通好結為父子事之為君臣晉祖既因遼兵入洛陽登極割幽州五城之地入蕃以奉朝貢故令臣事於遼主守職為郎焉嗣主曰契丹為治何如對曰蕃不治漢漢不治蕃蕃漢不同治自古而然嗣主曰朝見何如對曰詔則呼漢兒蕃家既無翰墨何以徴賦對曰蕃地不産穀故無徴賦然臣仕單于迨方數嵗亦未嘗覩遼廷之事或𫝊徴兵適以箭為號每一部落𫝊箭一雙何以限多曰以皮為約何謂皮約曰築隘巷以一皮藉之兵騎踐而過焉以縻壊為度徴多則以駱駝次以羊以兔為凖卿主所以命孤者將奚為對曰晉少主逆命背約既遣入蕃遼主欲與君繼先君之好將册君為中原之主矣嗣主曰孤守江南社稷系嗣與梁宋阻修若契丹不忘先好惠錫行人孤受賜多矣其他不敢拜命之辱蕃使聞之遂行是時中原無主冦盜縱横嗣主乃歎曰孤不能因其厄運命將出師抗行中國恢復髙祖太宗之土宇而乃勞師於海隅孤實先代之罪人也至於悔恨百端不能自弭時泰州刺史皇甫暉王建及沿淮羣盜皆來降至明年命兵部尚書賈談入契丹報聘以太𫝊宋齊丘為洪州節度使漢中州節度使守司徒李守貞為漢師所圍遣從事朱元李平來乞師初晉少主世遼耶律徳光再冦河北命守貞副杜重威帥衆禦之至中渡橋為遼主所圍遂降之徳光既入梁園明年歸蕃漢髙祖自河東入踐阼重威因叛髙祖征之出城降至隱帝即位恐重威復叛遂誅之守貞乃重威之黨疑不自安遂據城不順隱帝命周太祖征之攻其城且急守貞懼乃竊遣元等至其表略曰臣之先世乃唐之逺裔祖侯禰將代不絶人茂績殊勲著於簡册昔日巢冦犯闕僖昭失御宗社板蕩為人所有臣雖生於梁末幼失怙恃零丁孤苦遭世多難迨能執戈捐身亊晉征討攻伐粗立戰功為髙祖見擢俾典禁衛頗著勞績尋屬顧命出守蒲津洎少主厄運遂沒北蕃晉鼎覆餗天下横流疆宇無主臣不勝忿惋痛心疾首欲效愚忠誅鋤虵豕恢復先業庶安宇内功未及立兇黨俄臨衆寡不敵遂罹圍廹臣雖躬當矢石以帥羣下悉力固守冀殄犬羊殞首不顧臣之分也然預備不虞有備不敗古之善教也臣逺聞君王霸有江左雄跨淮甸禁暴弭亂推亡固存有王者之風將繼巨唐有土者非君而誰況臣沗宗盟敢罄誠欵茍君王察臣忠勇憐顧本枝救患䘏鄰遏强拊順爰遣偏將出為東援則君有五霸之功不譲於桓文之主茍獲全濟實君之惠云云嗣主覽表遂遣潤州節度使李金全為北面行營招討使帥諸軍並進至淮甸聞河中城已陷守貞勢屈遂與妻子酣醼於樓上使下舉火自焚於是班師而元等畱江南誅節度使王建封初招討使王崇文圍福州命建封分兵攻其東城垂陷嗣主因其失機先詔崇文為福州節度使建封聞之心不平遂受李義厚賂先燒營而遁國家以前功未即加誅例轉同平章亊建封不識大體求綰中書政事嗣主曰卿乃一使相耳安可亂常僭於台輔汝無惹閙自是人號之為王惹閙日恣跋扈累表邀求發言不巽嗣主震怒發其前後罪犯殺之鼎州節度使馬希蕚遣使來乞師希蕚乃楚武穆王之子其家法兄弟𫝊國兄希範違命越次立同母弟希廣初希蕚授桂林節度使自鎮來奔喪未至希廣懼將害已使以舟師自上流迎衛送至鼎州既而搆隙欲誅希蕚故來乞師為援其表略曰昔先主早有勲業基有楚國不幸即世顧命之夕顯令兄弟以天倫紹立庶奉宗廟以享國祚無何嗣主不延永命奄棄社稷訃告至日臣不勝痛切膚骨泣血頥睫即時奔走哀庭冀處苫塊用竭臣子之孝不圖天未殄禍孽豎搆隙離間我戚屬汨亂我先序潛阻兵戈將謀勦絶茍不更圖殞在朝夕故臣敢逺遣行介殫布腹心惟君存先主之昔好振大國之威武許出兵援以附不腆庶俾盜黨免弄㓙器云云嗣主乃遣將何洙應之會希廣攻之不克希蕚遂帥州兵及五溪蠻攻殺希廣遂遣右僕射孫忌持節立希蕚為楚王既立荒滛驕恣不恤國政其將徐威等作亂乃囚希蕚立其弟希崇嗣主聞之遣邊鎬討之希崇出降遂入長沙迎希蕚希崇歸以為王初南漢王劉氏之子嗣立聞馬氏兄弟敗亂徙江南遂遣將進取桂林侵至桂陽界嗣主遣大將張巒至郴連間復歸禆将楊勝侯忠帥袁吉二郡鄉師合數千人分道而進至臨賀與廣人戰於城下廣人敗績城守使壅上流以誘我忠等見水淺乗勝破木柵而入因各争功縱兵亂掠廣人伏兵拒之忠等失利退遇水泛溢士卒溺死者大半餘衆宵遁巒未至桂林聞忠等敗於是巒班師秋分洪州髙安縣為筠州以右僕射孫忌為相鼎州劉言叛襲長沙邊鎬棄城走鎬為人柔懦酷懼釋氏凡出征伐無威嚴號令茍幸克捷多以生濟為利初平建州時人呼為邊羅漢至是政出羣小弱而無斷惟事桑門廣設雜施楚人罹苦謂之邊和尚乃無守禦脫身夜遁遂流之於饒州是嵗周太祖登極明年建康災焚廬舍營署踰月乃止保大十一年境内大旱自六月不雨至明年三月民大饑疫死大半下令郡縣煮粥賑之饑民食者皆死城内外傍水際積屍臭穢不堪行是嵗兖州節度使慕容彦超奉表乞師求援彦超乃漢髙祖同母異父弟性驕狠而無謀漢祖既登極遂授以兖州周太祖自鄴入京師彦超召帥部下輔隱帝拒戰尋敗因收集餘騎歸兖據城不順周太祖將親征之懼而求援嗣主遣兵數千至淮大為周師所敗俘其將校遂誅彦超彦超嘗以金帛募海上客得五百餘輩皆魁岸膂力勇敢及周師圍城客說彦超曰今圍急城且將陷請開門以熱血相潑一場決勝敗安能於危窘之地坐守誅戮彦超不能從周祖聞而義之城陷命開圍東角縱之客結圜陣而出周祖使戒之曰朕既赦汝所適城邑無害民人對曰臣皆海曲之民少負節義偶為彦超所悞不能成功臣之恥也今陛下既釋臣等願歸漁農以奉聖朝敢有他志再取亡歿言訖皆山呼而去太祖既平彦超乃釋所俘江南將校而諭之曰卿歸語汝主朕征有罪乃為君之道何煩逺援以附不庭朕方和結隣好休息邊境是所願也卿可言之嗣主聞而悔恨忘食先是漢末遣使往湘潭市茶會邊鎬平馬氏例俘於江南嗣主因而引對慰勞遂以上茗萬斤備人船遣之自夏口轉令入江陵而還是嵗周世宗嗣位明年夏擢天威軍都虞候劉仁贍為夀州節度使冬周師入淮甸命禆衛統軍劉彦貞帥師向夀春以禦之遣江州節度使皇甫暉將兵為援時周師棄營退據浮橋以俟我師彦貞議追之仁贍以為周師姦謀恐其設伏不如養銳以俟其隙彦貞將家子少長富貴惟貪惏聚歛為務莫知兵法不經戰鬭多喜虚譽能射帖子俗謂之劉一箭乃曰敵知吾至乃先遁之不追何待禆將臧師朗等恃勇寡謀貪功輕敵不顧兵騎夜發晨食至正陽争據其橋數戰不利為周師所敗諸將皆沒凡喪師計已七萬時江淮寧久民不知兵大軍既敗莫不惶怖諸郡無備皆棄城而北於是遣宰臣孫忌及鍾謨李徳明相次奉表請稱藩以和周世宗使徳明復命議盡割淮南之地為和好徳明既還盛稱世宗英敏徳明固請割地為便陳覺尤忌徳明因是固執割地無益且言徳明背國圖利然徳明素無行義言多過謬舉朝不信徳明知其說之不見用乃大呼於衆曰周師渡江國必亡矣嗣主怒乃斬徳明使齊王景達與陳覺帥師向夀春為援先是譲皇一族徙居泰州至是命園苑使尹延範迎置京口時道路已亂延範慮有變取其二弟六十餘人殺之以其婦女渡江嗣主大怒腰斬延範楊氏遂絶既而嗣主泣謂左右曰延範之死乃成濟之徒與孤非不知之不得已矣初江北諸郡興屯田執事者虐用民力人多怨之及周師至皆以牛酒迎之而周師不能安撫皆奴𨽻俘虜視之猶如草芥民乃不愜相與起義治農器為兵襞紙為鎧處處保聚謂之白甲子周師討之每為所禦劉仁贍厲志堅守遂襲城南大寨俘斬數千級禆將張全約周饒皆決以死誓時諸路進攻朱元復舒州李平克蘄州唐進克泰州周師在諸郡者皆退舍夀春元帥景達與陳覺屯濠州聚兵五萬無決戰之計築甬道欲通夀春張全約與周饒不和仁贍乃斬全約而周饒病死仁贍亦發疾時朱元陳覺有隙將戰遂與部下叛禆將時厚卿止之元殺之而行於是諸軍大潰邊鎬等為之擒景達陳覺奔還劉仁贍疾篤不能視事副使孫羽以城降唯楚州守將張彦卿不下周師圍之矢石如雨民雖死困守益堅迨一年食盡方陷彦卿夙將之後善撫師旅共啗甘苦城破之日與軍一萬戰而沒無一生降者遂屠其城世宗召江南之俘劉承遇諭以通和嗣主遂遣宰臣馮延己陳覺奉表至舒州獻廬滁和蘄黄之地以和遂下令去帝號正朔從顯徳以營屯應援使林仁肇為潤州節度使贈劉仁贍太師追封衛王贈孫忌太傅追封魯國公贈張彦卿侍中放太傅宋齊丘於池州九華舊隱初朱元之叛舉國震懾時陳覺李徴古每白嗣主言國祚將亡宋公本造國手非此公不可請舉國授之國事委行之後以聞陛下深居後苑與覺時從容奉談釋老而已嗣主乃命中書舍人陳喬具詔將行會喬極諌其議遂止陳覺自奉先面以世宗之命告嗣主曰江南連年拒命知是宰相嚴續所為可殺以謝過鍾謨聞之不信白嗣主固請北使覆實其事乃遣謨告謝自責言非續之罪此乃本國之過也世宗曰必使續如是乃忠臣矣朕為天下之主肯殺忠臣乎謨既反命嗣主乃下令盡發其前後罪惡遣使監守宋齊丘因自縊而死貶陳覺李徴古皆殺之初既使孫忌奉表稱藩而世宗遣李徳明反命議割淮南以和而不聽徳明見殺復使景達出師世宗聞之怒江南背約遂問忌江南可取虚實忌對曰臣本國雖小然甲兵尚三十萬餘未易可圖世宗譲忌曰江南不過十數郡而師旅太多何見欺歟忌曰精甲利兵即雖十餘萬然長江一條飛湍千里風濤激湧險過湯池所謂天塹也斯可敵十萬之師國老宋齊丘智運宏逺機變如神指授師徒坐制之勇乃王猛謝安之徒斯亦可敵十萬世宗聞而惡之乃載忌使諭劉仁贍趣降忌乃反其辭會左右譖忌於世宗云昔說朱守殷以汴州叛尋殺忌後使鍾謨還命曰朕與江南大義雖定然宋齊丘不死殆難保和好尋齊丘之死亦由是焉時彗孛頻見斗牛之分乃議遷都以避之嗣主以建康與敵隔境而江又在下流敵冦若至則嬰城自固茍令外郡守節能救其難乃為劉禪陳叔寳耳今吾移都豫章據其上流而制其根本此為上䇿羣議未決唯樞宻唐鎬贊成其議乃使修葺洪州為定都之計封次子從嘉為吳王居東宫貶禮部侍郎鍾謨尋殺之貶天威軍張巒於宣州殺之與鍾謨謀逆故也改豫章郡為南都是嵗宋太祖登極建隆二年春嗣主如南都立吳王從嘉為太子監國所過郡邑慰勞守宰存問髙年疾苦次于廬山與從臣遊於山中寺觀徧覽勝景賦詩談宴旬日而行三月至南都洪州乃藩鎮之地及為王都則湫隘尤劇宫府營署十不容其一二自公卿以下軍士皂𨽻日夕思歸嗣主恐生變憂忿煩悸此因唐鎬阿㫖欲置極法鎬懼縊死嗣主方議東還未幾而疾作殂於洪州年四十六歸葬建康嗣主音容閑雅眉目若畫趣向清潔好學而能詩然天性儒懦素昧威武自嗣立以來嘗欲脫去機務以游泳澹寂而社稷所係不獲其已而聰悟迷惑濶於聴斷政事多為左右所沮東征西討出不由衷刑辜戮姦於怒是致號令無法長惡稔愆喪師虚國自已而作及周師俄至頹然無備神情委懾若無所措先主顧命之辭徒虚語爾孝子賢君不亦逺乎於是衂於割地愧作藩臣情慮荒悸不能自懋遂議遷都遁强趨弱亦叔世季年實可嗟悼既至南都常不自安將宴百寮於殿上見故太傅宋齊丘自陛而趨進心惡之入而得疾數日而殂識者謂信讒而害于賢良之故矣初先主既封齊王將受吳禪有善相者至先主遂列諸子見之相者因指齊王景達曰此雖不及於公然善持守者也先主復問嗣主相者曰只恐不了公家事先主不從及嗣主繼立嘗欲禪位景達與宋齊丘既不獲後果喪淮甸而國幾亡矣後景達出鎮臨川開寶中以夀終江南野史卷二
